<!DOCTYPE html>
<html>
<body>
    <div id="queue-screen">
        <button onclick="joinQueue()">Find Game</button>
        <p id="status">Press to find a game</p>
    </div>

    <div id="game-screen" style="display:none">
        <h2>Counter Game</h2>
        <p>Count: <span id="count">0</span></p>
        <button onclick="increment()">Increment</button>
        <button onclick="reconnect()">Simulate Reconnect</button>
        <p id="game-status"></p>
    </div>

    <script>
        let gameWs = null
        let playerId = localStorage.getItem("playerId")
        let playerName = "Player" + Math.floor(Math.random() * 1000)
        let currentLobby = localStorage.getItem("lobbyId")

        function joinQueue() {
            document.getElementById("status").innerText = "Searching for players..."
            document.querySelector("button").disabled = true

            const matchWs = new WebSocket("ws://localhost:8787/matchmaker?queue=0")

            matchWs.onmessage = (event) => {
                const message = JSON.parse(event.data)

                if(message.command === "Match") {
                    currentLobby = message.lobby
                    localStorage.setItem("lobbyId", currentLobby)
                    joinLobby(currentLobby)  // join first
                    matchWs.close()          // then close
                }
            }

            matchWs.onerror = () => {
                document.getElementById("status").innerText = "Error connecting to matchmaker"
                document.querySelector("button").disabled = false
            }
        }

        function joinLobby(lobbyId) {
            let url = `ws://localhost:8787/websocket?lobby=${lobbyId}&playerName=${playerName}`

            if(playerId) {
                url += `&playerId=${playerId}`
            }

            gameWs = new WebSocket(url)

            gameWs.onopen = () => {
                document.getElementById("queue-screen").style.display = "none"
                document.getElementById("game-screen").style.display = "block"
                document.getElementById("game-status").innerText = "Connected - ID: " + (playerId ?? "new player")
            }

            gameWs.onmessage = (event) => {
                const message = JSON.parse(event.data)

                if(message.playerId) {
                    playerId = message.playerId
                    localStorage.setItem("playerId", playerId)
                    document.getElementById("game-status").innerText = "Connected - ID: " + playerId
                }

                if(message.state)
                {
                    document.getElementById("count").innerText = message.state.count
                }

                if(message.count !== undefined) {
                    document.getElementById("count").innerText = message.count
                }
            }

            gameWs.onclose = () => {
                document.getElementById("game-status").innerText = "Disconnected"
            }
        }

        function increment() {
            if(gameWs && gameWs.readyState === WebSocket.OPEN) {
                gameWs.send(JSON.stringify({ type: "INCREMENT", payload: {} }))
            }
        }

        function reconnect() {
            if(gameWs) gameWs.close()
            if(currentLobby) joinLobby(currentLobby)
        }

        // auto reconnect if we have a stored lobby and player id
        if(currentLobby && playerId) {
            document.getElementById("status").innerText = "Reconnecting to previous game..."
            joinLobby(currentLobby)
        }
    </script>
</body>
</html>
